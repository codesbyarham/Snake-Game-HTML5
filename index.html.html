<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 100%;
        }
        
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            margin-bottom: 10px;
        }
        
        .score-container {
            font-size: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        #game-board {
            border: 3px solid #00ffff;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            background-color: #0f3460;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .game-info {
            text-align: center;
            margin-top: 10px;
            font-size: 1rem;
            color: #a5b1c2;
        }
        
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            display: none;
            z-index: 10;
            width: 80%;
            max-width: 400px;
        }
        
        #game-over h2 {
            font-size: 2.5rem;
            color: #ff0000;
            margin-bottom: 20px;
            animation: flash 0.8s infinite;
        }
        
        #final-score {
            font-size: 1.8rem;
            margin: 15px 0;
        }
        
        #restart-btn {
            background: linear-gradient(to right, #00b4db, #0083b0);
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 180, 219, 0.7);
        }
        
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            .score-container {
                font-size: 1.2rem;
            }
            
            #game-over h2 {
                font-size: 2rem;
            }
            
            #final-score {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Snake Game</h1>
        <div class="score-container">Score: <span id="score">0</span></div>
        <div style="position: relative;">
            <canvas id="game-board" width="400" height="400"></canvas>
            <div id="game-over">
                <h2>Game Over</h2>
                <p>Your snake crashed!</p>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>
        <div class="controls">
            <div class="game-info">Use arrow keys to control the snake</div>
            <div class="game-info">Swipe on mobile to change direction</div>
        </div>
    </div>

    <script>
        // Game constants
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        const INITIAL_SNAKE_LENGTH = 3;
        const INITIAL_SPEED = 150; // milliseconds per move

        // Game variables
        let canvas, ctx;
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameInterval;
        let gameOver = false;
        let touchStartX = 0;
        let touchStartY = 0;

        // Initialize the game
        function init() {
            canvas = document.getElementById('game-board');
            ctx = canvas.getContext('2d');
            
            // Set canvas size based on grid
            canvas.width = GRID_SIZE * CELL_SIZE;
            canvas.height = GRID_SIZE * CELL_SIZE;
            
            resetGame();
            document.getElementById('restart-btn').addEventListener('click', resetGame);
            document.addEventListener('keydown', handleKeyDown);
            canvas.addEventListener('touchstart', handleTouchStart);
            canvas.addEventListener('touchmove', handleTouchMove);
        }

        // Reset the game to initial state
        function resetGame() {
            // Clear any existing game interval
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            // Reset game state
            snake = [];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameOver = false;
            
            // Initialize snake in the middle of the board
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            
            for (let i = 0; i < INITIAL_SNAKE_LENGTH; i++) {
                snake.push({ x: startX - i, y: startY });
            }
            
            // Generate first food
            generateFood();
            
            // Update score display
            document.getElementById('score').textContent = score;
            document.getElementById('final-score').textContent = score;
            
            // Hide game over screen
            document.getElementById('game-over').style.display = 'none';
            
            // Start game loop
            gameInterval = setInterval(gameLoop, INITIAL_SPEED);
        }

        // Main game loop
        function gameLoop() {
            if (gameOver) return;
            
            // Update direction
            direction = nextDirection;
            
            // Move snake
            moveSnake();
            
            // Check for collisions
            if (checkCollision()) {
                endGame();
                return;
            }
            
            // Check if food is eaten
            if (snake[0].x === food.x && snake[0].y === food.y) {
                eatFood();
            }
            
            // Draw everything
            draw();
        }

        // Move the snake
        function moveSnake() {
            // Create new head based on current direction
            const head = { x: snake[0].x, y: snake[0].y };
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // Add new head to beginning of snake array
            snake.unshift(head);
            
            // Remove tail if no food was eaten
            if (head.x !== food.x || head.y !== food.y) {
                snake.pop();
            }
        }

        // Check for collisions
        function checkCollision() {
            const head = snake[0];
            
            // Check wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                return true;
            }
            
            // Check self collision (skip first segment)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }

        // Generate food at random position
        function generateFood() {
            let newFood;
            let onSnake;
            
            do {
                onSnake = false;
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                
                // Check if food is on snake
                for (let segment of snake) {
                    if (segment.x === newFood.x && segment.y === newFood.y) {
                        onSnake = true;
                        break;
                    }
                }
            } while (onSnake);
            
            food = newFood;
        }

        // Handle food consumption
        function eatFood() {
            // Increase score
            score += 10;
            document.getElementById('score').textContent = score;
            
            // Generate new food
            generateFood();
            
            // Increase speed every 50 points
            if (score % 50 === 0) {
                clearInterval(gameInterval);
                const newSpeed = Math.max(INITIAL_SPEED - Math.floor(score / 50) * 10, 50);
                gameInterval = setInterval(gameLoop, newSpeed);
            }
        }

        // Draw everything on the canvas
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid background
            ctx.fillStyle = '#0d1930';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw food with glow effect
            ctx.fillStyle = '#ff3838';
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // Add glow effect
            ctx.shadowColor = '#ff3838';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                
                // Create gradient for snake body
                const gradient = ctx.createLinearGradient(
                    segment.x * CELL_SIZE,
                    segment.y * CELL_SIZE,
                    segment.x * CELL_SIZE + CELL_SIZE,
                    segment.y * CELL_SIZE + CELL_SIZE
                );
                
                if (i === 0) {
                    // Head with distinct color
                    gradient.addColorStop(0, '#00ff8f');
                    gradient.addColorStop(1, '#00cc72');
                } else {
                    // Body with different gradient
                    const intensity = 150 - Math.min(140, i * 2);
                    gradient.addColorStop(0, `rgb(0, ${intensity}, 255)`);
                    gradient.addColorStop(1, `rgb(0, ${intensity - 40}, 200)`);
                }
                
                ctx.fillStyle = gradient;
                
                // Draw rounded rectangles for snake segments
                drawRoundedRect(
                    ctx,
                    segment.x * CELL_SIZE + 1,
                    segment.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2,
                    5
                );
                
                // Draw eyes on head
                if (i === 0) {
                    ctx.fillStyle = '#000';
                    
                    // Position eyes based on direction
                    let eyeOffsetX = 0;
                    let eyeOffsetY = 0;
                    
                    switch(direction) {
                        case 'right': eyeOffsetX = 5; break;
                        case 'left': eyeOffsetX = -5; break;
                        case 'up': eyeOffsetY = -5; break;
                        case 'down': eyeOffsetY = 5; break;
                    }
                    
                    // Left eye
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * CELL_SIZE + CELL_SIZE / 3 + eyeOffsetX * 0.3,
                        segment.y * CELL_SIZE + CELL_SIZE / 3 + eyeOffsetY * 0.3,
                        2,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                    
                    // Right eye
                    ctx.beginPath();
                    ctx.arc(
                        segment.x * CELL_SIZE + 2 * CELL_SIZE / 3 + eyeOffsetX * 0.3,
                        segment.y * CELL_SIZE + CELL_SIZE / 3 + eyeOffsetY * 0.3,
                        2,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            }
        }

        // Helper function to draw rounded rectangles
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        // Handle keyboard input
        function handleKeyDown(e) {
            // Prevent default action for arrow keys to avoid page scrolling
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            
            // Set next direction based on key pressed, prevent 180° turns
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
                case ' ': // Space bar to restart
                    if (gameOver) resetGame();
                    break;
            }
        }

        // Handle touch events for mobile
        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }

        function handleTouchMove(e) {
            if (!touchStartX || !touchStartY) return;
            
            const touchEndX = e.touches[0].clientX;
            const touchEndY = e.touches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            // Determine swipe direction based on which axis had the larger movement
            if (Math.abs(dx) > Math.abs(dy)) {
                // Horizontal swipe
                if (dx > 0 && direction !== 'left') {
                    nextDirection = 'right';
                } else if (dx < 0 && direction !== 'right') {
                    nextDirection = 'left';
                }
            } else {
                // Vertical swipe
                if (dy > 0 && direction !== 'up') {
                    nextDirection = 'down';
                } else if (dy < 0 && direction !== 'down') {
                    nextDirection = 'up';
                }
            }
            
            // Reset touch start position
            touchStartX = null;
            touchStartY = null;
            
            // Prevent default to avoid scrolling
            e.preventDefault();
        }

        // End the game
        function endGame() {
            gameOver = true;
            clearInterval(gameInterval);
            
            // Update final score
            document.getElementById('final-score').textContent = score;
            
            // Show game over screen
            document.getElementById('game-over').style.display = 'block';
        }

        // Initialize the game when the page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
